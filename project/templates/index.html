<!DOCTYPE html>
<html>
<head>
    <title>House Price Prediction</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">
    <h1>🏠 House Price Prediction</h1>

    <form action="/predict" method="post">
        <input type="text" name="area" placeholder="Area (sq ft)" required><br>
        <input type="text" name="bedrooms" placeholder="Bedrooms" required><br>
        <input type="text" name="bathrooms" placeholder="Bathrooms" required><br>

        <button type="submit">Predict Price</button>
    </form>

    <h2>{{ prediction_text }}</h2>
</div>

</body>
</html>
